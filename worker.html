<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>维修师傅</title>
<link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="apple-touch-icon" href="/icon-192.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="white">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;background:#f5f0eb;color:#2c241a;min-height:100vh}
.header{background:#5a7a4a;color:#fff;padding:16px;position:sticky;top:0;z-index:10;text-align:center}
.header h1{font-size:18px;font-weight:600}
.header p{font-size:12px;opacity:.8;margin-top:2px}
.container{max-width:480px;margin:0 auto;padding:12px}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px}
.card h3{font-size:14px;font-weight:600}
.card .meta{font-size:12px;color:#6a5a4a;margin-top:4px}
.card .prob{font-size:13px;color:#2c241a;margin-top:6px;line-height:1.5}
.status{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500;margin-left:6px}
.status.pending{background:#f5e6cc;color:#8a7355}
.status.doing{background:#e0e8f0;color:#4a5a7a}
.status.done{background:#e8f0e0;color:#5a7a4a}
.action-row{display:flex;gap:8px;margin-top:10px}
.action-btn{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;text-align:center}
.action-btn.green{background:#5a7a4a;color:#fff}
.action-btn.gray{background:#e0ddd8;color:#4a3a2a}
.action-btn.blue{background:#4a5a7a;color:#fff}
.tabs{display:flex;background:#e8e3de;border-radius:10px;margin-bottom:12px;overflow:hidden}
.tabs span{flex:1;padding:10px;text-align:center;font-size:13px;cursor:pointer;transition:all .2s}
.tabs span.active{background:#fff;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.1);border-radius:10px}
.empty{text-align:center;padding:40px 20px;color:#8a7a6a;font-size:14px}
.empty .icon{font-size:40px;margin-bottom:10px}
.photo-grid{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.photo-grid img{width:60px;height:60px;border-radius:6px;object-fit:cover}
.photo-upload{width:60px;height:60px;border:2px dashed #ccc;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#aaa;cursor:pointer}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:16px;padding:20px;width:90%;max-width:380px;max-height:80vh;overflow-y:auto}
.modal-box h2{font-size:16px;margin-bottom:12px}
.form-group{margin-bottom:12px}
.form-group label{font-size:12px;color:#6a5a4a;display:block;margin-bottom:4px}
.form-group textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;resize:vertical;min-height:60px;font-family:inherit}
.modal-actions{display:flex;gap:8px;margin-top:14px}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#3a3026;color:#f5f0eb;padding:12px 24px;border-radius:12px;font-size:14px;z-index:200;display:none}
</style>
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
        .then(function(reg) { console.log('SW registered', reg.scope); })
        .catch(function(err) { console.log('SW registration failed', err); });
}
</script>
</head>
<body>
<div class="header">
    <h1>🔧 维修工单</h1>
    <p>输入手机号查看我的工单</p>
</div>
<div class="container" id="app">
    <div style="display:flex;gap:8px;margin-bottom:12px">
        <input id="phoneInput" type="tel" placeholder="输入您的手机号" style="flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff">
        <button onclick="login()" style="padding:10px 16px;background:#5a7a4a;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer">查工单</button>
    </div>
    <div id="workerName" style="display:none;padding:10px 14px;background:#e8f0e0;border-radius:8px;margin-bottom:12px;font-size:13px">👤 维修师傅：<strong id="workerNameText"></strong></div>
    <div class="tabs" id="tabBar" style="display:none">
        <span class="active" onclick="switchTab('pending')">🕐 待处理</span>
        <span onclick="switchTab('doing')">🔧 维修中</span>
        <span onclick="switchTab('done')">✅ 已完成</span>
    </div>
    <div id="repairList"></div>
</div>

<!-- 完工弹窗 -->
<div class="modal-overlay" id="modal">
<div class="modal-box">
    <h2>✏️ 完工登记</h2>
    <div class="form-group">
        <label>维修备注</label>
        <textarea id="noteInput" placeholder="记录维修情况、更换的配件等..."></textarea>
    </div>
    <div class="form-group">
        <label>完工照片（最多2张）</label>
        <div class="photo-grid" id="photoGrid"></div>
        <input type="file" id="fileInput" accept="image/*" style="display:none" multiple>
    </div>
    <div class="modal-actions">
        <button class="action-btn gray" onclick="closeModal()">取消</button>
        <button class="action-btn green" onclick="confirmComplete()">✅ 确认完工</button>
    </div>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
var allRepairs = [];
var currentPhone = '';
var currentTab = 'pending';
var completePhotos = [];
var completeId = '';

function login(){
    var phone = document.getElementById('phoneInput').value.trim();
    if(!phone || !/^1\d{10}$/.test(phone)){
        showToast('请输入正确的手机号');
        return;
    }
    currentPhone = phone;
    document.getElementById('workerName').style.display = 'block';
    document.getElementById('workerNameText').textContent = phone;
    document.getElementById('tabBar').style.display = 'flex';
    loadRepairs();
}

function loadRepairs(){
    fetch('/api/rent/repairs?t='+Date.now())
    .then(function(r){ return r.json(); })
    .then(function(d){
        if(d.code === 0 && d.data){
            // 模拟分配规则：简单轮询，这里让维修师傅看到所有自己手机号命名的工单
            // 如果没有按人分，就全部显示（小团队模式）
            allRepairs = d.data;
            render();
        }else{
            showToast('加载失败');
        }
    }).catch(function(){
        showToast('网络异常');
    });
}

function switchTab(tab){
    currentTab = tab;
    var btns = document.querySelectorAll('.tabs span');
    for(var i=0;i<btns.length;i++){
        if(tab==='pending' && i===0) btns[i].classList.add('active');
        else if(tab==='doing' && i===1) btns[i].classList.add('active');
        else if(tab==='done' && i===2) btns[i].classList.add('active');
        else btns[i].classList.remove('active');
    }
    render();
}

function render(){
    var filtered = allRepairs.filter(function(r){
        if(currentTab === 'pending') return !r.status || r.status === '待处理';
        else if(currentTab === 'doing') return r.status === '维修中';
        else return r.status === '已完成';
    });

    var h = '';
    if(filtered.length === 0){
        h = '<div class="empty"><div class="icon">🔧</div>暂无'+ (currentTab==='pending'?'待处理':(currentTab==='doing'?'维修中':'已完成')) +'工单</div>';
        document.getElementById('repairList').innerHTML = h;
        return;
    }
    for(var i=0;i<filtered.length;i++){
        var r = filtered[i];
        var statusClass = r.status === '已完成' ? 'done' : (r.status === '维修中' ? 'doing' : 'pending');
        var statusLabel = r.status === '维修中' ? '🔧 维修中' : (r.status === '已完成' ? '✅ 已完成' : '🕐 待处理');
        var timeStr = r.create_time ? r.create_time.slice(0,16) : '';

        // 照片
        var photosHtml = '';
        if(r.photos && r.photos.length > 0){
            photosHtml = '<div class="photo-grid">';
            for(var j=0;j<r.photos.length;j++){
                photosHtml += '<img src="/'+r.photos[j]+'" onclick="window.open(this.src)">';
            }
            photosHtml += '</div>';
        }
        // 备注
        var noteHtml = r.note ? '<div style="font-size:12px;color:#5a7a4a;margin-top:4px">📝 '+escHtml(r.note)+'</div>' : '';

        // 操作按钮
        var actionHtml = '';
        if(r.status === '待处理' || !r.status){
            actionHtml = '<div class="action-row"><span class="action-btn green" onclick="startRepair(\''+r.id+'\')">🔧 接单</span></div>';
        }else if(r.status === '维修中'){
            actionHtml = '<div class="action-row"><span class="action-btn blue" onclick="openComplete(\''+r.id+'\')">✅ 完工登记</span></div>';
        }

        h += '<div class="card">'+
            '<h3>📌 '+escHtml(r.room_title)+' <span class="status '+statusClass+'">'+statusLabel+'</span></h3>'+
            '<div class="meta">👤 '+escHtml(r.name)+' · 📞 '+escHtml(r.phone)+' · 🕐 '+timeStr+'</div>'+
            '<div class="prob">⚡ '+escHtml(r.problem)+'</div>'+
            photosHtml+
            noteHtml+
            actionHtml+
        '</div>';
    }
    document.getElementById('repairList').innerHTML = h;
}

function startRepair(id){
    if(!confirm('确定接单？')) return;
    fetch('/api/rent/repair/update', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id:id, status:'维修中', operator:'维修师傅('+currentPhone+')'})
    }).then(function(r){ return r.json(); }).then(function(d){
        if(d.code === 0){
            showToast('✅ 已接单');
            loadRepairs();
        }else{
            showToast('❌ '+d.msg);
        }
    }).catch(function(){
        showToast('❌ 网络异常');
    });
}

function openComplete(id){
    completeId = id;
    completePhotos = [];
    document.getElementById('noteInput').value = '';
    renderCompletePhotos();
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function addPhoto(){
    var input = document.getElementById('fileInput');
    input.value = '';
    input.click();
    input.onchange = function(e){
        var files = e.target.files;
        for(var k=0;k<files.length && completePhotos.length<2;k++){
            (function(file){
                var reader = new FileReader();
                reader.onload = function(ev){ completePhotos.push(ev.target.result); renderCompletePhotos(); };
                reader.readAsDataURL(file);
            })(files[k]);
        }
    };
}

function renderCompletePhotos(){
    var grid = document.getElementById('photoGrid');
    var html = '';
    for(var i=0;i<completePhotos.length;i++){
        html += '<div style="position:relative;width:60px;height:60px"><img src="'+completePhotos[i]+'" style="width:60px;height:60px;border-radius:6px;object-fit:cover"><span style="position:absolute;top:-4px;right:-4px;width:18px;height:18px;background:#c06050;color:#fff;border-radius:50%;font-size:11px;text-align:center;line-height:18px;cursor:pointer" onclick="completePhotos.splice('+i+',1);renderCompletePhotos()">✕</span></div>';
    }
    if(completePhotos.length < 2) html += '<div class="photo-upload" onclick="addPhoto()">+</div>';
    grid.innerHTML = html;
}

function confirmComplete(){
    var note = document.getElementById('noteInput').value.trim();
    fetch('/api/rent/repair/update', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id:completeId, status:'已完成', note:note, photos:completePhotos, operator:'维修师傅('+currentPhone+')'})
    }).then(function(r){ return r.json(); }).then(function(d){
        closeModal();
        if(d.code === 0){
            showToast('✅ 完工登记成功');
            loadRepairs();
        }else{
            showToast('❌ '+d.msg);
        }
    }).catch(function(){
        showToast('❌ 网络异常');
    });
}

function showToast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    clearTimeout(t._timer);
    t._timer = setTimeout(function(){ t.style.display = 'none'; }, 2500);
}

function escHtml(s){return String(s||'').replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]})}
</script>
</body>
</html>
